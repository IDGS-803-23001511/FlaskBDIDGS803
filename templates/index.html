{% extends "layout.html" %} 
{% block container %}

<div class="w-full max-w-5xl space-y-6">

  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-heading">
      LISTA
    </h1>
    <a 
      href="Alumnos"
      class="inline-flex items-center gap-2 text-white bg-brand hover:bg-brand-strong shadow-md font-medium rounded-base text-sm px-4 py-2.5 transition duration-200"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5">
        <path fill-rule="evenodd" d="M19.5 21a3 3 0 0 0 3-3V9a3 3 0 0 0-3-3h-5.379a.75.75 0 0 1-.53-.22L11.47 3.66A2.25 2.25 0 0 0 9.879 3H4.5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h15Zm-6.75-10.5a.75.75 0 0 0-1.5 0v2.25H9a.75.75 0 0 0 0 1.5h2.25v2.25a.75.75 0 0 0 1.5 0v-2.25H15a.75.75 0 0 0 0-1.5h-2.25V10.5Z" clip-rule="evenodd" />
      </svg>
      NUEVO
    </a>
  </div>


  <div class="relative overflow-x-auto bg-neutral-primary-soft shadow-md rounded-xl border border-default">


    <div class="p-4 border-b border-default">
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
          <svg class="w-4 h-4 text-body" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-width="2"
              d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
          </svg>
        </div>
        <input
          type="text"
          class="block w-full max-w-sm ps-9 py-2.5 bg-neutral-secondary-medium border border-default-medium text-sm rounded-lg focus:ring-brand focus:border-brand shadow-sm"
          placeholder="Buscar alumno..."
        />
      </div>
    </div>

    <table class="w-full text-sm text-left text-body">
      <thead class="text-xs uppercase tracking-wider bg-neutral-secondary-medium border-b border-default-medium">
        <tr>
          <th class="px-6 py-3 font-semibold">NOMBRE</th>
          <th class="px-6 py-3 font-semibold">APELLIDOS</th>
          <th class="px-6 py-3 font-semibold">TELEFONO</th>
          <th class="px-6 py-3 font-semibold">CORREO</th>
          <th class="px-6 py-3 font-semibold text-right">ACCIONES</th>
        </tr>
      </thead>

      <tbody>
        {% for alumno in alumnos %}
        <tr class="border-b border-default hover:bg-neutral-secondary-medium transition duration-150">
          <td class="px-6 py-4 font-medium text-heading whitespace-nowrap">
            {{ alumno.nombre }}
          </td>
          <td class="px-6 py-4">{{ alumno.apellidos }}</td>
          <td class="px-6 py-4">{{ alumno.telefono }}</td>
          <td class="px-6 py-4 font-semibold">{{ alumno.email }}</td>

          <td class="px-6 py-4">
            <div class="flex justify-end gap-2">
              <a 
                href="detalles?id={{ alumno.id }}"
                title="Ver"
                class="flex items-center justify-center w-9 h-9 rounded-lg bg-blue-500 hover:bg-blue-600 text-white shadow-md transition duration-200"
              >
                <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                  viewBox="0 0 24 24" stroke-width="1.5"
                  stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 12s3.75-7.5 9.75-7.5S21.75 12 21.75 12 18 19.5 12 19.5 2.25 12 2.25 12Z" />
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 15.75a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z" />
                </svg>
              </a>

              <a 
                href="modificar?id={{ alumno.id }}"
                title="Modificar"
                class="flex items-center justify-center w-9 h-9 rounded-lg bg-amber-500 hover:bg-amber-600 text-white shadow-md transition duration-200"
              >
                <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                  viewBox="0 0 24 24" stroke-width="1.5"
                  stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.862 4.487l1.651-1.651a2.121 2.121 0 1 1 3 3L10.582 16.767a4.5 4.5 0 0 1-1.897 1.13l-2.685.805.805-2.685a4.5 4.5 0 0 1 1.13-1.897L16.862 4.487Z"/>
                </svg>
              </a>

              <a 
                href="eliminar?id={{ alumno.id }}"
                title="Eliminar"
                class="flex items-center justify-center w-9 h-9 rounded-lg bg-red-500 hover:bg-red-600 text-white shadow-md transition duration-200"
              >
                <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                  viewBox="0 0 24 24" stroke-width="1.5"
                  stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6 18L18 6M6 6l12 12" />
                </svg>
              </a>

            </div>
          </td>

        </tr>
        {% endfor %}
      </tbody>
    </table>

  </div>
</div>

{% endblock %}
